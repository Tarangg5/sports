<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Jio Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .shaka-video-container { width: 100%; max-width: 900px; aspect-ratio: 16/9; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { margin-top: 15px; text-align: center; }
        #channelLogo { width: 50px; border-radius: 5px; vertical-align: middle; margin-right: 10px; }
        #loading { color: yellow; }
        #error { color: red; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">Loading Live Stream...</div>
    <div id="error"></div>

    <div class="shaka-video-container">
        <video id="video" autoplay playsinline style="width:100%; height:100%"></video>
    </div>

    <div class="info">
        <img id="channelLogo" src="" alt="">
        <span id="channelName" style="font-size: 20px;"></span>
    </div>
</div>

<script>
// Aapka naya API link yahan rahega
const API = "https://newcomb.sonuujamuicamp.workers.dev/";

function getId() {
    return new URLSearchParams(location.search).get("id");
}

async function fetchChannel() {
    const targetId = getId();
    if (!targetId) {
        showError("Channel ID missing in URL (?id=...)");
        return null;
    }
    try {
        const res = await fetch(API);
        const data = await res.json();
        // Naye JSON format ke hisaab se "id" field check kar rahe hain
        return data.find(c => c.id == targetId);
    } catch (e) {
        showError("Failed to fetch data from API");
        return null;
    }
}

function showError(msg) {
    document.getElementById("loading").style.display = "none";
    const err = document.getElementById("error");
    err.innerText = msg;
    err.style.display = "block";
}

async function startPlayer(channel) {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
        showError("Browser not supported");
        return;
    }

    const video = document.getElementById("video");
    const player = new shaka.Player(video);
    const container = document.querySelector(".shaka-video-container");

    const ui = new shaka.ui.Overlay(player, container, video);

    player.configure({
        drm: {
            // Naye JSON mein keyId aur key same hain
            clearKeys: { [channel.keyId]: channel.key }
        },
        streaming: {
            lowLatencyMode: true,
            bufferingGoal: 30,
            rebufferingGoal: 2,
            stallEnabled: false
        }
    });

    const cookieValue = channel.cookie;

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

        if (cookieValue) {
            request.headers["Cookie"] = cookieValue;
        }

        // Cookie ko URL segments mein add karna (agar tokenized URL hai)
        if (cookieValue && (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST)) {
            if (!request.uris[0].includes("__hdnea__")) {
                const sep = request.uris[0].includes("?") ? "&" : "?";
                request.uris[0] += sep + cookieValue;
            }
        }
    });

    try {
        // Naye JSON mein URL field ka naam "url" hai
        await player.load(channel.url);
        document.getElementById("loading").style.display = "none";
    } catch (e) {
        console.error(e);
        showError("Stream failed to start (Check if keys or cookie expired)");
    }
}

async function init() {
    const channel = await fetchChannel();
    if (!channel) {
        if(getId()) showError("Channel not found in JSON");
        return;
    }

    // Naye JSON fields ki mapping
    document.getElementById("channelLogo").src = channel.logo;
    document.getElementById("channelName").innerText = channel.name;
    startPlayer(channel);
}

init();
</script>

</body>
</html>
