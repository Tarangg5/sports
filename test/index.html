<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Dynamic Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .shaka-video-container { width: 100%; max-width: 900px; aspect-ratio: 16/9; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { margin-top: 15px; text-align: center; }
        #channelLogo { width: 50px; border-radius: 5px; vertical-align: middle; margin-right: 10px; }
        #loading { color: yellow; font-size: 18px; }
        #error { color: red; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">M3U Data Fetching...</div>
    <div id="error"></div>

    <div class="shaka-video-container">
        <video id="video" autoplay playsinline style="width:100%; height:100%"></video>
    </div>

    <div class="info">
        <img id="channelLogo" src="" alt="">
        <span id="channelName" style="font-size: 20px;"></span>
    </div>
</div>

<script>
// Aapka M3U Raw Link yahan rahega
const M3U_URL = "https://paste.sonuujamuicamp.workers.dev/"; 

function getParam(name) {
    return new URLSearchParams(location.search).get(name);
}

async function parseM3U() {
    const targetId = getParam("id");
    if (!targetId) {
        showError("ID missing (?id=Star_Sports_1_HD_Hindi)");
        return null;
    }

    try {
        const response = await fetch(M3U_URL);
        const text = await response.text();
        const lines = text.split('\n');
        let channel = {};

        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes(`tvg-id="${targetId}"`)) {
                // Name & Logo extraction
                channel.name = lines[i].split(',')[1].trim();
                const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                channel.logo = logoMatch ? logoMatch[1] : "";

                // Metadata parsing from next lines
                let j = i + 1;
                while (j < lines.length && !lines[j].startsWith('#EXTINF')) {
                    if (lines[j].includes('license_key=')) {
                        channel.keyUrl = lines[j].split('license_key=')[1].trim();
                    }
                    if (lines[j].includes('#EXTHTTP:')) {
                        const jsonStr = lines[j].replace('#EXTHTTP:', '').trim();
                        const httpData = JSON.parse(jsonStr);
                        channel.cookie = httpData.Cookie;
                    }
                    if (lines[j].startsWith('http')) {
                        channel.url = lines[j].trim();
                    }
                    j++;
                }
                return channel;
            }
        }
        showError("Channel ID not found in M3U");
    } catch (e) {
        showError("Failed to load M3U file");
    }
    return null;
}
async function fetchClearKey(url) {
    try {
        const res = await fetch(url);
        const data = await res.json();
        // Agar response mein 'keys' array hai, toh wahi format Shaka ko chahiye
        if (data && data.keys) {
            return data; 
        }
        return null;
    } catch (e) {
        console.error("Key fetch failed:", e);
        showError("License JSON Fetch Failed");
        return null;
    }
}

async function startPlayer(channel) {
    shaka.polyfill.installAll();
    const video = document.getElementById("video");
    const player = new shaka.Player(video);
    const container = document.querySelector(".shaka-video-container");
    new shaka.ui.Overlay(player, container, video);

    // PHP link se poora JSON data fetch kar rahe hain
    const drmData = await fetchClearKey(channel.keyUrl);

    player.configure({
        drm: {
            // Shaka Player ClearKey JSON ko 'servers' ya 'clearKeys' dono mein handle kar leta hai
            clearKeys: {
                // Hum JSON se manual extract kar rahe hain compatibility ke liye
                [drmData.keys[0].kid]: drmData.keys[0].k
            }
        },
        streaming: { 
            lowLatencyMode: true,
            jumpLargeGaps: true
        }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        // Headers as per your requirement
        request.headers["User-Agent"] = "Hotstar;in.startv.hotstar/25.02.24.8.11169 (Android/15)";
        request.headers["Referer"] = "https://www.jiotv.com/";
        
        if (channel.cookie) {
            request.headers["Cookie"] = channel.cookie;
        }
    });

    try {
        await player.load(channel.url);
        document.getElementById("loading").style.display = "none";
    } catch (e) {
        console.error("Error Code:", e.code, e);
        showError("Playback Error: " + e.code);
    }
}


async function init() {
    const channel = await parseM3U();
    if (channel) {
        document.getElementById("channelLogo").src = channel.logo;
        document.getElementById("channelName").innerText = channel.name;
        startPlayer(channel);
    }
}

init();
</script>
</body>
</html>
