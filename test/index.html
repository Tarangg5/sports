<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jio TV Live Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .shaka-video-container { width: 100%; max-width: 900px; aspect-ratio: 16/9; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .info { margin-top: 15px; text-align: center; }
        #channelLogo { width: 50px; border-radius: 8px; vertical-align: middle; margin-right: 12px; }
        #loading { color: #ffcc00; font-weight: bold; margin-bottom: 10px; }
        #error { color: #ff4444; display: none; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">Streaming Data Load Ho Raha Hai...</div>
    <div id="error"></div>

    <div class="shaka-video-container" data-shaka-player-container>
        <video id="video" autoplay playsinline style="width:100%; height:100%"></video>
    </div>

    <div class="info">
        <img id="channelLogo" src="" alt="">
        <span id="channelName" style="font-size: 22px; font-weight: bold;"></span>
    </div>
</div>

<script>
// AAPKA NAYA M3U WORKER LINK
const API = "https://cool-salad-7156.sonuujamuicamp.workers.dev/";

function getId() {
    return new URLSearchParams(location.search).get("id");
}

async function fetchChannel() {
    const id = getId();
    if (!id) {
        showError("URL mein Channel ID missing hai! (?id=153)");
        return null;
    }
    try {
        const res = await fetch(API);
        const text = await res.text();
        const lines = text.split('\n');
        
        let channel = {};
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes(`tvg-id="${id}"`)) {
                // Info Line se Logo aur Name nikalein
                channel.channel_name = lines[i].split(',')[1]?.trim();
                const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                channel.channel_logo = logoMatch ? logoMatch[1] : "";
                
                // KodiProp aur URL nikalein
                const keyLine = lines[i+1].includes('license_key') ? lines[i+1] : lines[i+2];
                const cookieLine = lines[i+2].includes('EXTHTTP') ? lines[i+2] : lines[i+3];
                
                channel.license_key = keyLine.split('=')[1]?.trim();
                const cookieJson = cookieLine.replace('#EXTHTTP:', '').trim();
                channel.cookie = JSON.parse(cookieJson).Cookie;
                channel.channel_url = lines[i+4]?.trim();
                break;
            }
        }
        return channel.channel_url ? channel : null;
    } catch (e) {
        showError("Worker se data fetch karne mein error aaya.");
        return null;
    }
}

function showError(msg) {
    document.getElementById("loading").style.display = "none";
    const err = document.getElementById("error");
    err.innerText = msg;
    err.style.display = "block";
}

async function startPlayer(channel) {
    shaka.polyfill.installAll();
    const video = document.getElementById("video");
    const player = new shaka.Player(video);
    const container = document.querySelector(".shaka-video-container");

    const ui = new shaka.ui.Overlay(player, container, video);

    const [kid, key] = channel.license_key.split(':');
    player.configure({
        drm: { clearKeys: { [kid]: key } },
        streaming: {
            lowLatencyMode: true,
            bufferingGoal: 30,
            rebufferingGoal: 2,
            stallEnabled: false
        }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

        if (channel.cookie) {
            request.headers["Cookie"] = channel.cookie;
        }

        if (channel.cookie && (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST)) {
            if (!request.uris[0].includes("__hdnea__")) {
                const sep = request.uris[0].includes("?") ? "&" : "?";
                request.uris[0] += sep + channel.cookie;
            }
        }
    });

    try {
        await player.load(channel.channel_url);
        document.getElementById("loading").style.display = "none";
    } catch (e) {
        showError("Stream start nahi ho saki. Token ya Key expire ho gayi hogi.");
    }
}

async function init() {
    const channel = await fetchChannel();
    if (!channel) {
        showError("Channel nahi mila!");
        return;
    }

    document.getElementById("channelLogo").src = channel.channel_logo;
    document.getElementById("channelName").innerText = channel.channel_name;
    startPlayer(channel);
}

document.addEventListener('shaka-ui-loaded', init);
</script>

</body>
</html>
