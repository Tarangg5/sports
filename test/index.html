<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jio TV Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .shaka-video-container { width: 100%; max-width: 1000px; aspect-ratio: 16/9; background: #111; }
        #loading { margin-bottom: 10px; color: #ffcc00; }
        #error { color: #ff4444; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loading">Connecting to Stream...</div>
<div id="error"></div>

<div class="shaka-video-container" data-shaka-player-container>
    <video id="video" autoplay playsinline style="width:100%; height:100%"></video>
</div>

<script>
// AAPKA NAYA WORKER LINK
const M3U_URL = "https://cool-salad-7156.sonuujamuicamp.workers.dev/";

async function initPlayer() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    
    if (!id) {
        document.getElementById('loading').innerText = "Error: Please add ?id=CHANNEL_ID to URL";
        return;
    }

    try {
        const response = await fetch(M3U_URL);
        const text = await response.text();
        
        // M3U parsing logic to find the specific channel by ID
        const lines = text.split('\n');
        let channel = {};

        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes(`tvg-id="${id}"`)) {
                // KodiProp format se key aur headers nikalna
                const keyLine = lines[i+2]; // #KODIPROP:inputstream.adaptive.license_key=...
                const cookieLine = lines[i+3]; // #EXTHTTP:{"Cookie":"..."}
                
                channel.license_key = keyLine.split('=')[1]?.trim();
                // JSON parsing to get Cookie value
                const cookieJson = cookieLine.replace('#EXTHTTP:', '').trim();
                channel.cookie = JSON.parse(cookieJson).Cookie;
                channel.url = lines[i+4]?.trim();
                break;
            }
        }

        if (!channel.url) throw new Error("Channel ID not found in M3U");

        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);

        // --- CLEARKEY CONFIG ---
        const [kid, key] = channel.license_key.split(':');
        player.configure({
            drm: { clearKeys: { [kid]: key } },
            streaming: { lowLatencyMode: true }
        });

        // --- JIO SPECIFIC REQUEST HEADERS ---
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            // Referer aur User-Agent jo aapne manga tha
            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            
            if (channel.cookie) {
                request.headers["Cookie"] = channel.cookie;
            }

            // Segment URLs mein cookie token append karna (For MPD)
            if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                if (!request.uris[0].includes("__hdnea__")) {
                    const sep = request.uris[0].includes("?") ? "&" : "?";
                    request.uris[0] += sep + channel.cookie;
                }
            }
        });

        await player.load(channel.url);
        document.getElementById('loading').style.display = "none";

    } catch (e) {
        document.getElementById('loading').style.display = "none";
        const errDiv = document.getElementById('error');
        errDiv.innerText = "Error: " + e.message;
        errDiv.style.display = "block";
        console.error(e);
    }
}

document.addEventListener('shaka-ui-loaded', initPlayer);
document.addEventListener('shaka-ui-load-failed', () => alert("Shaka UI failed to load"));
</script>
</body>
</html>
