<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U GitHub Master 🛰️</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; text-align: center; }
        
        /* Status ko sabse highlight rakha hai */
        #status { 
            margin-bottom: 20px; 
            color: #58a6ff; 
            font-weight: bold; 
            font-size: 1.2rem; 
            background: #161b22; 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #30363d;
        }

        .btn { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; }
        .btn:hover { background: #2ea043; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        
        .input-group { margin-bottom: 15px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; width: 85%; max-width: 450px; }
        
        #linkBox { margin-top: 20px; display: none; padding: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; }
        textarea { width: 100%; height: 180px; margin-top: 20px; background: #010409; color: #7ee787; border: 1px solid #30363d; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; }
        
        a { color: #58a6ff; font-weight: bold; font-size: 15px; word-break: break-all; }
        .save-info { color: #8b949e; font-size: 12px; margin-top: 5px; }
        .update-tag { color: #7ee787; font-size: 13px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="status">Taiyar: Details check karein aur Fetch shuru karein.</div>

    <div class="input-group">
        <input type="password" id="ghToken" placeholder="GitHub Token yahan daalein">
    </div>
    <div class="input-group">
        <input type="text" id="gistId" placeholder="Gist ID yahan daalein">
        <div class="save-info">Token aur ID browser mein auto-save ho jayenge.</div>
    </div>

    <button id="fetchBtn" class="btn">1. Fetch All Channels</button>
    <button id="uploadBtn" class="btn" style="background:#8957e5; display:none;">2. Push to GitHub Gist</button>
    
    <div id="linkBox">
        <strong style="color: #7ee787;">Update Success! ✅</strong><br><br>
        <a id="finalLink" href="#" target="_blank">Raw Link Yahan Hai</a>
        <span id="updateTimeTag" class="update-tag"></span>
    </div>
    
    <textarea id="output" readonly placeholder="Logs yahan dikhenge..."></textarea>

    <script>
        const baseUrl = "https://vathaalanew.sonuujamuicamp.workers.dev/";
        const totalPages = 21; // Aapki updated limit

        const ghTokenInput = document.getElementById('ghToken');
        const gistIdInput = document.getElementById('gistId');
        const fetchBtn = document.getElementById('fetchBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const linkBox = document.getElementById('linkBox');
        const finalLink = document.getElementById('finalLink');
        const updateTimeTag = document.getElementById('updateTimeTag');

        // Load Saved Info
        window.onload = () => {
            ghTokenInput.value = localStorage.getItem('gh_token') || '';
            gistIdInput.value = localStorage.getItem('gist_id') || '';
        };

        function getISTTime() {
            return new Date().toLocaleString('en-IN', { 
                timeZone: 'Asia/Kolkata', 
                day: '2-digit', month: 'short', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', hour12: true 
            });
        }

        // 1. Fetch Logic
        fetchBtn.addEventListener('click', async () => {
            fetchBtn.disabled = true;
            uploadBtn.style.display = "none";
            linkBox.style.display = "none";
            output.value = "";
            
            const timeNow = getISTTime();
            let fullPlaylist = `#EXTM3U\n# LAST UPDATED: ${timeNow} (IST)\n\n`;

            try {
                for (let i = 1; i <= totalPages; i++) {
                    status.innerText = `🔄 Processing: Page ${i} / ${totalPages}`;
                    const response = await fetch(`${baseUrl}?page=${i}`);
                    const text = await response.text();
                    const cleanContent = text.replace("#EXTM3U", "").trim();
                    if (cleanContent) fullPlaylist += cleanContent + "\n\n";
                }
                output.value = fullPlaylist;
                status.innerText = `Fetch Complete! ✅ (${timeNow})`;
                uploadBtn.style.display = "inline-block";
            } catch (err) {
                status.innerText = "❌ Fetch Error: " + err.message;
            } finally {
                fetchBtn.disabled = false;
            }
        });

        // 2. Upload Logic
        uploadBtn.addEventListener('click', async () => {
            const token = ghTokenInput.value;
            const gistId = gistIdInput.value;
            const content = output.value;

            if (!token || !gistId) return alert("Token aur ID dono bhariye!");

            localStorage.setItem('gh_token', token);
            localStorage.setItem('gist_id', gistId);

            status.innerText = "🚀 GitHub par update ho raha hai...";
            uploadBtn.disabled = true;

            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: "PATCH",
                    headers: { "Authorization": `token ${token}` },
                    body: JSON.stringify({
                        "files": { "playlist.m3u": { "content": content } }
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    const rawUrl = data.files["playlist.m3u"].raw_url;
                    finalLink.href = rawUrl;
                    finalLink.innerText = rawUrl;
                    updateTimeTag.innerText = "Updated at: " + getISTTime();
                    linkBox.style.display = "block";
                    status.innerText = "Gist Updated Successfully! 🔥";
                } else {
                    throw new Error(data.message || "Update fail");
                }
            } catch (err) {
                status.innerText = "❌ Error: " + err.message;
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
