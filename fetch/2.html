<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U GitHub Master 🛰️</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; text-align: center; }
        .btn { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; }
        .btn:hover { background: #2ea043; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .input-group { margin-bottom: 15px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; width: 85%; max-width: 450px; }
        
        /* Status ab Fetch buttons ke upar hai */
        #status { margin-top: 20px; margin-bottom: 10px; color: #58a6ff; font-weight: bold; }
        
        #linkBox { margin-top: 20px; display: none; padding: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; }
        textarea { width: 100%; height: 200px; margin-top: 20px; background: #010409; color: #7ee787; border: 1px solid #30363d; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; }
        a { color: #58a6ff; font-weight: bold; font-size: 16px; word-break: break-all; }
        .save-info { color: #8b949e; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>M3U GitHub Auto-Updater 🐙</h2>
    <p>Railway Master Setup: Token aur ID ab save rahenge!</p>

    <div class="input-group">
        <input type="password" id="ghToken" placeholder="GitHub Token yahan daalein">
    </div>
    <div class="input-group">
        <input type="text" id="gistId" placeholder="Gist ID yahan daalein">
        <div class="save-info">Ye dono cheezein aapke browser mein save ho jayengi.</div>
    </div>

    <div id="status">Details bhariye aur shuru karein...</div>

    <button id="fetchBtn" class="btn">1. Fetch Channels</button>
    <button id="uploadBtn" class="btn" style="background:#8957e5; display:none;">2. Push to GitHub Gist</button>
    
    <div id="linkBox">
        <strong>Aapka Permanent RAW Link:</strong><br><br>
        <a id="finalLink" href="#" target="_blank">Link yahan aayega</a>
    </div>
    
    <textarea id="output" readonly></textarea>

    <script>
        const baseUrl = "https://vathaalanew.sonuujamuicamp.workers.dev/";
        const totalPages = 21;

        const ghTokenInput = document.getElementById('ghToken');
        const gistIdInput = document.getElementById('gistId');
        const fetchBtn = document.getElementById('fetchBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const linkBox = document.getElementById('linkBox');
        const finalLink = document.getElementById('finalLink');

        // IST Time function
        function getISTTime() {
            return new Date().toLocaleString('en-IN', { 
                timeZone: 'Asia/Kolkata', 
                day: '2-digit', month: 'short', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', hour12: true 
            });
        }

        window.onload = () => {
            const savedToken = localStorage.getItem('gh_token');
            const savedGistId = localStorage.getItem('gist_id');
            if (savedToken) ghTokenInput.value = savedToken;
            if (savedGistId) gistIdInput.value = savedGistId;
            if (savedToken && savedGistId) status.innerText = "Saved details mil gayi! Fetch shuru karein.";
        };

        fetchBtn.addEventListener('click', async () => {
            fetchBtn.disabled = true;
            uploadBtn.style.display = "none";
            linkBox.style.display = "none";
            output.value = "";
            
            const timeNow = getISTTime();
            let fullPlaylist = `#EXTM3U\n# LAST UPDATED: ${timeNow} (IST)\n\n`;

            try {
                for (let i = 1; i <= totalPages; i++) {
                    status.innerText = `🔄 Fetching Page ${i} of ${totalPages}...`;
                    const response = await fetch(`${baseUrl}?page=${i}`);
                    const text = await response.text();
                    const cleanContent = text.replace("#EXTM3U", "").trim();
                    if (cleanContent) fullPlaylist += cleanContent + "\n\n";
                }
                output.value = fullPlaylist;
                status.innerText = `Fetch Complete! ✅ (${timeNow})`;
                uploadBtn.style.display = "inline-block";
            } catch (err) {
                status.innerText = "❌ Fetch Error: " + err.message;
            } finally {
                fetchBtn.disabled = false;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            const token = ghTokenInput.value;
            const gistId = gistIdInput.value;
            const content = output.value;

            if (!token || !gistId) return alert("Token aur Gist ID dono zaroori hain!");

            localStorage.setItem('gh_token', token);
            localStorage.setItem('gist_id', gistId);

            status.innerText = "🚀 GitHub par update ho raha hai...";
            uploadBtn.disabled = true;

            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: "PATCH",
                    headers: { "Authorization": `token ${token}` },
                    body: JSON.stringify({
                        "files": { "playlist.m3u": { "content": content } }
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    const rawUrl = data.files["playlist.m3u"].raw_url;
                    finalLink.href = rawUrl;
                    finalLink.innerText = rawUrl;
                    linkBox.style.display = "block";
                    status.innerText = "Success! Gist Update Ho Gaya. ✅";
                } else {
                    throw new Error(data.message || "Update fail hua");
                }
            } catch (err) {
                status.innerText = "❌ Error: " + err.message;
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
