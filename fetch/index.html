<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Master Combiner</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 5px; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn-upload { background: #ffc107; color: black; display: none; } /* Upload Button */
        .btn-upload:hover { background: #e0a800; }
        #status { margin-top: 20px; color: #aaa; font-weight: bold; }
        #linkBox { margin-top: 15px; display: none; padding: 15px; background: #333; border-radius: 8px; word-break: break-all; }
        textarea { width: 100%; height: 300px; margin-top: 20px; background: #1e1e1e; color: #00ff00; border: 1px solid #333; padding: 10px; font-family: monospace; border-radius: 8px; }
        a { color: #00ff00; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>M3U Master Combiner</h2>
    <p>Sabhik pages fetch karein aur direct link banayein.</p>

    <button id="fetchBtn" class="btn">1. Generate Full Playlist</button>
    <button id="uploadBtn" class="btn btn-upload">2. Auto Upload & Get Link</button>
    
    <div id="status">Taiyar rahein...</div>
    
    <div id="linkBox">
        Playlist Link: <br>
        <a id="finalLink" href="#" target="_blank"></a>
    </div>
    
    <textarea id="output" readonly placeholder="Result yahan dikhega..."></textarea>

    <script>
        const baseUrl = "https://vathaalanew.sonuujamuicamp.workers.dev/";
        const totalPages = 21;

        const fetchBtn = document.getElementById('fetchBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const linkBox = document.getElementById('linkBox');
        const finalLink = document.getElementById('finalLink');

        // 1. Fetch Logic
        fetchBtn.addEventListener('click', async () => {
            fetchBtn.disabled = true;
            uploadBtn.style.display = "none";
            linkBox.style.display = "none";
            output.value = "";
            let fullPlaylist = "#EXTM3U\n# Combined Playlist\n\n";

            try {
                for (let i = 1; i <= totalPages; i++) {
                    status.innerText = `Fetching Page ${i} of ${totalPages}...`;
                    const response = await fetch(`${baseUrl}?page=${i}`);
                    const text = await response.text();
                    const cleanContent = text.replace("#EXTM3U", "").trim();
                    if (cleanContent && !cleanContent.includes("No more channels")) {
                        fullPlaylist += cleanContent + "\n\n";
                    }
                }

                output.value = fullPlaylist;
                status.innerText = "Fetch Poora Hua! Ab upload karein.";
                uploadBtn.style.display = "inline-block";

            } catch (err) {
                status.innerText = "Error: " + err.message;
            } finally {
                fetchBtn.disabled = false;
            }
        });

        // 2. Auto Upload Logic (Using dpaste.org API)
        uploadBtn.addEventListener('click', async () => {
            const content = output.value;
            if (!content) return;

            status.innerText = "Uploading to Cloud... Please wait.";
            uploadBtn.disabled = true;

            try {
                // dpaste.org API call
                const response = await fetch('https://dpaste.org/api/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        'content': content,
                        'expiry_days': 30, // 30 din tak link zinda rahega
                        'syntax': 'text'
                    })
                });

                const rawUrl = await response.text();
                const cleanUrl = rawUrl.trim() + ".txt"; // .txt lagane se raw content milta hai

                if (cleanUrl.startsWith("https")) {
                    finalLink.href = cleanUrl;
                    finalLink.innerText = cleanUrl;
                    linkBox.style.display = "block";
                    status.innerText = "Upload Successful! Link niche hai.";
                } else {
                    throw new Error("Invalid response from server");
                }

            } catch (err) {
                status.innerText = "Upload failed: " + err.message;
                alert("Upload fail hua. Manually copy karne ki koshish karein.");
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
