<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U GitHub Master 🛰️</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; text-align: center; }
        .btn { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; font-weight: bold; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .input-group { margin-bottom: 15px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; width: 80%; max-width: 400px; }
        #status { margin-top: 20px; color: #58a6ff; font-weight: bold; }
        #linkBox { margin-top: 20px; display: none; padding: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; }
        textarea { width: 100%; height: 200px; margin-top: 20px; background: #010409; color: #7ee787; border: 1px solid #30363d; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; }
        a { color: #58a6ff; font-weight: bold; font-size: 18px; word-break: break-all; }
    </style>
</head>
<body>

    <h2>M3U GitHub Auto-Updater 🐙</h2>
    <p>Ek baar Token aur Gist ID daalein, fir hamesha ke liye link fix!</p>

    <div class="input-group">
        <input type="password" id="ghToken" placeholder="Yahan GitHub Token Daalein">
    </div>
    <div class="input-group">
        <input type="text" id="gistId" placeholder="Gist ID (Bana hua hai toh daalein, warna khali chhodein)">
    </div>

    <button id="fetchBtn" class="btn">1. Fetch Channels</button>
    <button id="uploadBtn" class="btn" style="background:#8957e5; display:none;">2. Push to GitHub Gist</button>
    
    <div id="status">GitHub Token taiyar rakhein...</div>
    
    <div id="linkBox">
        <strong>Aapka Permanent RAW Link:</strong><br><br>
        <a id="finalLink" href="#" target="_blank">Link yahan aayega</a>
    </div>
    
    <textarea id="output" readonly></textarea>

    <script>
        const baseUrl = "https://vathaalanew.sonuujamuicamp.workers.dev/";
        const totalPages = 14;

        const fetchBtn = document.getElementById('fetchBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const linkBox = document.getElementById('linkBox');
        const finalLink = document.getElementById('finalLink');

        fetchBtn.addEventListener('click', async () => {
            fetchBtn.disabled = true;
            output.value = "";
            let fullPlaylist = "#EXTM3U\n\n";

            try {
                for (let i = 1; i <= totalPages; i++) {
                    status.innerText = `🔄 Fetching Page ${i}...`;
                    const response = await fetch(`${baseUrl}?page=${i}`);
                    const text = await response.text();
                    const cleanContent = text.replace("#EXTM3U", "").trim();
                    if (cleanContent) fullPlaylist += cleanContent + "\n\n";
                }
                output.value = fullPlaylist;
                status.innerText = "Fetch Complete! Ab GitHub par Push karein.";
                uploadBtn.style.display = "inline-block";
            } catch (err) {
                status.innerText = "❌ Fetch Error: " + err.message;
            } finally {
                fetchBtn.disabled = false;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            const token = document.getElementById('ghToken').value;
            const existingGistId = document.getElementById('gistId').value;
            const content = output.value;

            if (!token) return alert("Pehle GitHub Token daalein!");

            status.innerText = "🐙 GitHub par update ho raha hai...";
            uploadBtn.disabled = true;

            const url = existingGistId ? `https://api.github.com/gists/${existingGistId}` : "https://api.github.com/gists";
            const method = existingGistId ? "PATCH" : "POST";

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "description": "My IPTV Master Playlist",
                        "public": true,
                        "files": { "playlist.m3u": { "content": content } }
                    })
                });

                const data = await res.json();
                if (data.id) {
                    const rawUrl = data.files["playlist.m3u"].raw_url;
                    finalLink.href = rawUrl;
                    finalLink.innerText = rawUrl;
                    linkBox.style.display = "block";
                    status.innerText = "Success! Link OTT Navigator mein daalein.";
                    // Gist ID save karle taaki agli baar update ho naya na bane
                    document.getElementById('gistId').value = data.id;
                    alert("Agli baar ke liye ye Gist ID save karlein: " + data.id);
                }
            } catch (err) {
                status.innerText = "❌ Error: " + err.message;
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
