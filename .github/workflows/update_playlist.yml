name: Manual M3U Update

on:
  workflow_dispatch: # Manual Button
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein auto

permissions: # Permission error fix karne ke liye
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history lega taaki push mein error na aaye

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Direct Node 24 set kar diya warning hatane ke liye

      - name: Fetch Fresh M3U
        run: |
          # WORKER_URL secret check karein agar error aaye
          curl -s "${{ secrets.WORKER_URL }}" > playlist.m3u

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add playlist.m3u
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes detected in playlist.m3u, skipping commit."
          else
            git commit -m "Auto Update: Fresh Playlist Data"
            git push origin main
          fi
