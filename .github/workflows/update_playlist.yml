name: Manual M3U Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node warning fix
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Fresh M3U
        run: |
          # Agar WORKER_URL set hai toh file download hogi
          curl -s "${{ secrets.WORKER_URL }}" > playlist.m3u

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add playlist.m3u
          
          # FORCE SUCCESS: Agar changes nahi hain toh bhi 'exit 0' (Green) dikhayega
          git commit -m "Auto Update: Fresh Playlist Data" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
        
        # '|| echo' lagane se exit code hamesha 0 (Success) rahega
