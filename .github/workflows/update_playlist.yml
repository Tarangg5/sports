name: Manual M3U Update

on:
  workflow_dispatch: # Manual Button
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein auto

permissions:
  contents: write # Permission error fix karne ke liye

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    env:
      # Is line se Node 20 ki warning khatam ho jayegi
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch Fresh M3U
        run: |
          # Worker se data fetch karke temp file mein save karega
          curl -s "${{ secrets.WORKER_URL }}" > playlist.m3u

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add playlist.m3u
          
          # Agar koi badlav nahi hai, toh script peacefully exit karegi (Exit Code 0)
          if git diff --staged --quiet; then
            echo "No changes detected in playlist.m3u. Skipping push."
          else
            git commit -m "Auto Update: Fresh Playlist Data"
            git push origin main
          fi
