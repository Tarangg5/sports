name: Manual M3U Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    # Node 20 ki warning hatane ke liye
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Fresh M3U
        run: |
          # Fresh data fetch kar raha hai
          curl -s "${{ secrets.WORKER_URL }}" > playlist.m3u

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add playlist.m3u
          
          # ASLI FIX: Agar changes nahi hain, toh 'exit 0' (Green Tick) dega
          if git diff --staged --quiet; then
            echo "No changes to commit. Everything is up to date."
            exit 0
          else
            git commit -m "Auto Update: Fresh Playlist Data"
            git push origin main
          fi
        # Isse kisi bhi halat mein 'exit 3' nahi aayega
