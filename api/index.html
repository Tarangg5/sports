<script>
    const workerUrl = "https://your-worker.workers.dev/";

    async function searchChannels() {
        const query = document.getElementById('searchInput').value;
        const listContainer = document.getElementById('channelList');
        
        if(query.length < 3) {
            alert("Kam se kam 3 words likhiye!");
            return;
        }

        listContainer.innerHTML = "<p>Searching... Please wait...</p>";

        try {
            const response = await fetch(`${workerUrl}?search=${query}`);
            const data = await response.text();
            parseM3U(data);
        } catch (error) {
            listContainer.innerHTML = "<p style='color:red'>Error loading channels.</p>";
        }
    }

    function parseM3U(m3uData) {
        const listContainer = document.getElementById('channelList');
        listContainer.innerHTML = ""; 

        const lines = m3uData.split('\n');
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('#EXTINF')) {
                const info = lines[i];
                const streamUrl = lines[i + 1];
                
                const nameMatch = info.match(/,(.*)$/);
                const name = nameMatch ? nameMatch[1] : "Unknown Channel";
                
                const logoMatch = info.match(/tvg-logo="(.*?)"/);
                const logo = logoMatch ? logoMatch[1] : "https://via.placeholder.com/150?text=No+Logo";

                // Card design with Copy Button
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <img src="${logo}" alt="Logo">
                    <span class="channel-name">${name}</span>
                    <button class="btn-copy" onclick="copyToClipboard('${streamUrl}')" 
                        style="margin-top:10px; background:#00ffcc; color:#000; border:none; padding:5px; border-radius:5px; cursor:pointer; width:100%; font-weight:bold;">
                        Copy Link
                    </button>
                `;
                listContainer.appendChild(card);
            }
        }
    }

    // Link Copy karne wala function
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert("Link Copy Ho Gaya! ✅");
        }).catch(err => {
            console.error('Copy fail ho gaya: ', err);
        });
    }
</script>
