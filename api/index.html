<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU NEON PLAYER | Live, Movies & Series</title>
    <style>
        body { background: #0f0f0f; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 20px; }
        .type-selector { margin: 15px; display: flex; justify-content: center; flex-wrap: wrap; }
        .type-btn { padding: 10px 15px; background: #1a1a1a; color: #00ffcc; border: 1px solid #00ffcc; cursor: pointer; border-radius: 15px; margin: 5px; flex: 1; max-width: 120px; font-size: 12px; }
        .active { background: #00ffcc !important; color: #000 !important; font-weight: bold; box-shadow: 0 0 10px #00ffcc; }
        
        input[type="text"] { width: 85%; padding: 12px; border-radius: 25px; border: 2px solid #00ffcc; background: #1a1a1a; color: #fff; outline: none; margin-bottom: 10px; }
        .btn-search { padding: 12px 40px; background: #00ffcc; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        #list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .copy-btn { background: #fff; color: #000; border: none; padding: 7px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 11px; }
        .play-btn { background: #007bff; color: #fff; border: none; padding: 7px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 11px; text-decoration: none; display: block; }
    </style>
</head>
<body>

    <h2 style="text-shadow: 0 0 10px #00ffcc;">SONU NEON <span>PLAYER</span></h2>

    <div class="type-selector">
        <button id="liveBtn" class="type-btn active" onclick="setType('live')">LIVE TV</button>
        <button id="vodBtn" class="type-btn" onclick="setType('vod')">MOVIES</button>
        <button id="seriesBtn" class="type-btn" onclick="setType('series')">SERIES</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search (Star, Pathaan, Mirzapur)...">
        <br>
        <button class="btn-search" onclick="doSearch()">DHUNDHO</button>
    </div>

    <div id="list"></div>

    <script>
        let currentType = 'live';
        const workerUrl = "https://newphptest-new.up.railway.app/data/index.php"; // APNA WORKER URL DALO

        function setType(type) {
            currentType = type;
            document.getElementById('liveBtn').classList.toggle('active', type === 'live');
            document.getElementById('vodBtn').classList.toggle('active', type === 'vod');
            document.getElementById('seriesBtn').classList.toggle('active', type === 'series');
        }

        async function doSearch() {
            const query = document.getElementById('searchInput').value;
            const listDiv = document.getElementById('list');
            if(query.length < 3) return alert("3 words min!");
            listDiv.innerHTML = "<p style='color:#fff'>Searching...</p>";

            try {
                const res = await fetch(`${workerUrl}?search=${encodeURIComponent(query)}&type=${currentType}`);
                const data = await res.text();
                displayResults(data);
            } catch (e) { listDiv.innerHTML = "Error!"; }
        }

        function displayResults(data) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            const lines = data.split('\n');

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    const logoMatch = lines[i].match(/tvg-logo="(.*?)"/);
                    const logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150';

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // NS Player Intent Link
                    const nsIntent = `intent:${url}#Intent;package=com.genuine.leone;end`;

                    card.innerHTML = `
                        <img src="${logo}">
                        <div style="font-size:11px; margin:8px 0; height:35px; overflow:hidden; color:#fff;">${name}</div>
                        <div class="btn-group">
                            <button class="copy-btn" onclick="copyIt('${url}', this)">COPY LINK</button>
                            <a href="${nsIntent}" class="play-btn">PLAY IN NS</a>
                        </div>
                    `;
                    listDiv.appendChild(card);
                }
            }
        }

        function copyIt(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = "COPIED! ✅";
                setTimeout(() => btn.innerText = oldText, 2000);
            });
        }
    </script>
</body>
</html>
