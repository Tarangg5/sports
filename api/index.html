<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU NEON PLAYER | Live & Movies</title>
    <style>
        body { background: #0f0f0f; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 20px; }
        .search-box { margin-bottom: 20px; }
        input[type="text"] { width: 80%; padding: 12px; border-radius: 20px; border: 2px solid #00ffcc; background: #1a1a1a; color: #fff; outline: none; }
        
        .type-selector { margin: 15px; }
        .type-btn { padding: 8px 20px; background: #1a1a1a; color: #00ffcc; border: 1px solid #00ffcc; cursor: pointer; border-radius: 15px; margin: 5px; }
        .active { background: #00ffcc !important; color: #000 !important; font-weight: bold; }

        .btn-search { padding: 10px 30px; background: #00ffcc; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .card img { width: 100%; height: 120px; object-fit: contain; border-radius: 5px; }
        .copy-btn { background: #fff; color: #000; border: none; padding: 5px; width: 100%; margin-top: 10px; cursor: pointer; border-radius: 5px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>SONU NEON <span>PLAYER</span></h2>

    <div class="type-selector">
        <button id="liveBtn" class="type-btn active" onclick="setType('live')">LIVE TV</button>
        <button id="vodBtn" class="type-btn" onclick="setType('vod')">MOVIES</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search name here...">
        <br>
        <button class="btn-search" onclick="doSearch()">DHUNDHO</button>
    </div>

    <div id="list"></div>

    <script>
        let currentType = 'live';
        const workerUrl = "https://blue-sea-415d.sonuujamuicamp.workers.dev/"; // APNA WORKER URL DALO

        function setType(type) {
            currentType = type;
            document.getElementById('liveBtn').classList.toggle('active', type === 'live');
            document.getElementById('vodBtn').classList.toggle('active', type === 'vod');
        }

        async function doSearch() {
            const query = document.getElementById('searchInput').value;
            const listDiv = document.getElementById('list');
            if(query.length < 3) return alert("3 letters min!");

            listDiv.innerHTML = "Searching...";

            try {
                const res = await fetch(`${workerUrl}?search=${query}&type=${currentType}`);
                const data = await res.text();
                displayResults(data);
            } catch (e) { listDiv.innerHTML = "Error!"; }
        }

        function displayResults(data) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            const lines = data.split('\n');

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    const logoMatch = lines[i].match(/tvg-logo="(.*?)"/);
                    const logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150';

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${logo}">
                        <div style="font-size:12px; margin:5px 0; height:30px; overflow:hidden;">${name}</div>
                        <button class="copy-btn" onclick="copyIt('${url}', this)">COPY LINK</button>
                    `;
                    listDiv.appendChild(card);
                }
            }
        }

        function copyIt(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = "COPIED! ✅";
                setTimeout(() => btn.innerText = "COPY LINK", 2000);
            });
        }
    </script>
</body>
</html>
