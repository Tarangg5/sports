<!DOCTYPE html>
<html>
<head>
    <title>JTV M3U Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0b0b; color: #00ffcc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #121212; padding: 30px; border-radius: 20px; border: 1px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        textarea { width: 100%; height: 400px; background: #000; color: #00ffcc; border: 1px solid #333; padding: 15px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 13px; margin-top: 20px; outline: none; box-sizing: border-box; }
        .btn { display: inline-block; padding: 15px 40px; background: transparent; border: 2px solid #00ffcc; color: #00ffcc; text-decoration: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 10px; }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        #status { font-size: 14px; margin-bottom: 15px; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>M3U Playlist Generator</h2>
        <div id="status">Ready to Fetch (No Proxy Mode)</div>
        <button class="btn" onclick="generateM3U()">GENERATE NOW</button>
        <textarea id="output" readonly placeholder="Playlist generate hone ke baad yahan dikhegi..."></textarea>
    </div>

    <script>
        async function generateM3U() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            // URLs
            const channelJsonUrl = "https://raw.githubusercontent.com/sonuug5/newtest/refs/heads/main/json/jstr4web.json";
            const defaultCookieUrl = "https://allinonereborn.online/jstrweb2/cookies.json";
            const starCookieUrl = "https://allinonereborn.online/jtv-fetch/jstarcookie/cookie.json";

            try {
                status.innerText = "Direct Fetching Data...";
                
                // Bina Proxy ke fetch
                const [channelRes, defaultCookieRes, starCookieRes] = await Promise.all([
                    fetch(channelJsonUrl),
                    fetch(defaultCookieUrl),
                    fetch(starCookieUrl)
                ]);

                const channels = await channelRes.json();
                const defaultCookieData = await defaultCookieRes.json();
                const starFullData = await starCookieRes.json();

                status.innerText = "Data Received. Processing...";

                const starChannelsList = starFullData.failed_results || [];
                
                // Cookie Extraction Logic (Error Proof)
                let globalHdnea = "";
                if (Array.isArray(defaultCookieData)) {
                    const cookieObj = defaultCookieData.find(item => item && item.cookie);
                    if (cookieObj) globalHdnea = cookieObj.cookie.trim();
                } else if (defaultCookieData && defaultCookieData.cookie) {
                    globalHdnea = defaultCookieData.cookie.trim();
                }

                let m3uPlaylist = "#EXTM3U\n";

                channels.forEach((ch) => {
                    if (!ch.url) return;

                    let currentCookie = globalHdnea;
                    let cleanUrl = ch.url.split('?')[0];

                    // Star Sports Matching Logic
                    if (ch.name.toLowerCase().includes("star sports")) {
                        const matchedStar = starChannelsList.find(s => 
                            s.channel_name && s.channel_name.toLowerCase().trim() === ch.name.toLowerCase().trim()
                        );

                        if (matchedStar && matchedStar.error_details && matchedStar.error_details.final_url) {
                            const starUrl = matchedStar.error_details.final_url;
                            if (starUrl.includes("__hdnea__=")) {
                                currentCookie = "__hdnea__=" + starUrl.split("__hdnea__=")[1];
                            }
                        }
                    }

                    let finalUrl = `${cleanUrl}?${currentCookie}`;

                    m3uPlaylist += `#EXTINF:-1 tvg-id="${ch.name.replace(/\s+/g, '_')}" tvg-name="${ch.name}" tvg-logo="${ch.logo}" group-title="${ch.category}",${ch.name}\n`;
                    m3uPlaylist += `#KODIPROP:inputstream.adaptive.license_type=clearkey\n`;
                    m3uPlaylist += `#KODIPROP:inputstream.adaptive.license_key=${ch.keyId}:${ch.key}\n`;
                    m3uPlaylist += `#EXTHTTP:{"Cookie":"${currentCookie}"}\n`;
                    m3uPlaylist += `${finalUrl}\n\n`;
                });

                output.value = m3uPlaylist;
                status.innerText = "SUCCESS! Playlist Generated.";

            } catch (error) {
                status.innerHTML = `<span style="color:red">ERROR: ${error.message}</span><br><small>Shayad CORS block ho raha hai. Try with Allow CORS Extension.</small>`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
