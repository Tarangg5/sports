<!DOCTYPE html>
<html>
<head>
    <title>NS Player Auto-Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0b0b; color: #00ffcc; font-family: sans-serif; text-align: center; padding-top: 30%; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h3 id="status">Fetching Star Sports 1 Hindi...</h3>

    <script>
        async function startAutoRedirect() {
            const status = document.getElementById('status');
            const SOURCE_M3U = "https://allinone.sonujabmuicamp.workers.dev/"; 
            const PROXY = "https://corsproxy.io/?";

            try {
                // Proxy ke saath fetch karna
                const response = await fetch(PROXY + encodeURIComponent(SOURCE_M3U));
                const data = await response.text();

                // Playlist ko lines mein todna
                const lines = data.split('\n');
                let targetIndex = -1;

                // Wahi exact logic jo aapne diya: Star Sports 1 Hindi HD ko dhoondhna
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('tvg-name="Star Sports 1 Hindi HD"') || lines[i].includes('Star Sports 1 Hindi HD')) {
                        targetIndex = i;
                        break;
                    }
                }

                if (targetIndex !== -1) {
                    // Data nikalne ke liye lines identify karna (aapke worker ke hisaab se)
                    let licenseLine = lines[targetIndex + 2] || ""; 
                    let cookieLine = lines[targetIndex + 3] || "";  
                    let mpdUrl = lines[targetIndex + 4] || "";     

                    // Key nikalna
                    const keyMatch = licenseLine.match(/license_key=(.*)/);
                    const drmKey = keyMatch ? keyMatch[1].trim() : "";

                    // Cookie nikalna
                    const cookieMatch = cookieLine.match(/"Cookie":"(.*?)"/);
                    const cookie = cookieMatch ? cookieMatch[1] : "";

                    mpdUrl = mpdUrl.trim();

                    if (mpdUrl) {
                        status.innerText = "Redirecting...";
                        
                        // NS Player Intent Format
                        const intentUrl = `intent://${mpdUrl.replace(/^https?:\/\//, '')}?|Cookie=${encodeURIComponent(cookie)}&drmScheme=clearkey&drmLicense=${drmKey}#Intent;scheme=https;package=com.genuine.leone;S.title=Star_Sports_1_Hindi_Auto;end`;

                        // Launch Player
                        window.location.href = intentUrl;
                    } else {
                        status.innerText = "MPD URL nahi mila!";
                    }
                } else {
                    status.innerText = "Channel nahi mila!";
                }

            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }

        window.onload = startAutoRedirect;
    </script>
</body>
</html>
