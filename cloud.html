<!DOCTYPE html>
<html>
<head>
    <title>NS Player Auto-Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0b0b; color: #00ffcc; font-family: sans-serif; text-align: center; padding-top: 30%; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h3 id="status">Scanning Playlist...</h3>

    <script>
        async function startAutoRedirect() {
            const status = document.getElementById('status');
            const SOURCE_M3U = "https://allinone.sonujabmuicamp.workers.dev/"; 
            const PROXY = "https://corsproxy.io/?";

            try {
                const response = await fetch(PROXY + encodeURIComponent(SOURCE_M3U));
                const data = await response.text();
                const lines = data.split('\n');
                
                let mpdUrl = "";
                let drmKey = "";
                let cookie = "";

                // Poori playlist mein "Star Sports 1 Hindi" dhoondhna
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('Star Sports 1 Hindi')) {
                        // Jab channel mil jaye, toh uske niche ki 10 lines scan karo data ke liye
                        for (let j = 1; j <= 10; j++) {
                            let nextLine = lines[i + j] ? lines[i + j].trim() : "";
                            
                            if (nextLine.includes('license_key=')) {
                                drmKey = nextLine.split('license_key=')[1].trim();
                            } 
                            if (nextLine.includes('"Cookie":')) {
                                let match = nextLine.match(/"Cookie":"(.*?)"/);
                                if (match) cookie = match[1];
                            }
                            if (nextLine.startsWith('http') && nextLine.includes('.mpd')) {
                                mpdUrl = nextLine;
                            }
                            
                            // Agar teeno cheezein mil gayi toh loop rok do
                            if (mpdUrl && drmKey && cookie) break;
                        }
                        if (mpdUrl) break;
                    }
                }

                if (mpdUrl) {
                    status.innerText = "Channel Found! Launching...";
                    const intentUrl = `intent://${mpdUrl.replace(/^https?:\/\//, '')}?|Cookie=${encodeURIComponent(cookie)}&drmScheme=clearkey&drmLicense=${drmKey}#Intent;scheme=https;package=com.genuine.leone;S.title=Star_Sports_1_Auto;end`;
                    window.location.href = intentUrl;
                } else {
                    status.innerText = "Channel not found in list. Check if name changed!";
                }

            } catch (e) {
                status.innerText = "Error: Proxy or Source issue.";
            }
        }

        window.onload = startAutoRedirect;
    </script>
</body>
</html>
