<!DOCTYPE html>
<html>
<head>
    <title>Auto Star Sports Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0b0b; color: #00ffcc; font-family: sans-serif; text-align: center; padding-top: 30%; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-weight: bold; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h3 id="status">Fetching Latest Link...</h3>
    <p>Please wait, redirecting to NS Player</p>

    <script>
        async function launchPlayer() {
            const status = document.getElementById('status');
            // Source M3U URL
            const m3uUrl = "https://allinone.sonujabmuicamp.workers.dev/";
            // CORS Proxy (Taaki browser block na kare)
            const proxy = "https://corsproxy.io/?";

            try {
                const response = await fetch(proxy + encodeURIComponent(m3uUrl));
                const data = await response.text();
                const lines = data.split('\n');
                
                let targetIndex = -1;

                // Smart Keyword Search
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].toLowerCase();
                    if (line.includes('star') && line.includes('sports') && line.includes('hindi') && line.includes('1')) {
                        targetIndex = i;
                        break;
                    }
                }

                if (targetIndex !== -1) {
                    let drmKey = "";
                    let cookie = "";
                    let mpdUrl = "";

                    // Data parsing
                    for (let j = 1; j <= 5; j++) {
                        let currentLine = lines[targetIndex + j];
                        if (!currentLine) continue;

                        if (currentLine.includes('license_key=')) {
                            drmKey = currentLine.split('license_key=')[1].trim();
                        } else if (currentLine.includes('"Cookie":')) {
                            const match = currentLine.match(/"Cookie":"(.*?)"/);
                            if (match) cookie = match[1];
                        } else if (currentLine.startsWith('http')) {
                            mpdUrl = currentLine.trim();
                        }
                    }

                    if (mpdUrl) {
                        status.innerText = "Link Found! Launching...";
                        // Final Intent URL
                        const intentUrl = `intent://${mpdUrl.replace(/^https?:\/\//, '')}?|Cookie=${encodeURIComponent(cookie)}&drmScheme=clearkey&drmLicense=${drmKey}#Intent;scheme=https;package=com.genuine.leone;S.title=Star_Sports_1_Auto;end`;
                        
                        // Launch Player
                        window.location.href = intentUrl;
                    } else {
                        status.innerText = "MPD Link nahi mila!";
                    }
                } else {
                    status.innerText = "Channel list mein nahi mila!";
                }

            } catch (error) {
                status.innerText = "Error: Proxy or Source down!";
                console.error(error);
            }
        }

        // Run on load
        window.onload = launchPlayer;
    </script>
</body>
</html>
