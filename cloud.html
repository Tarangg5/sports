<!DOCTYPE html>
<html>
<head>
    <title>Auto Redirector Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0b0b; color: #00ffcc; font-family: sans-serif; text-align: center; padding-top: 30%; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-weight: bold; padding: 0 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h3 id="status">Connecting to Source...</h3>
    <p id="sub-status">Fetching latest Star Sports link</p>

    <script>
        async function launchPlayer() {
            const status = document.getElementById('status');
            const subStatus = document.getElementById('sub-status');
            
            const m3uUrl = "https://allinone.sonujabmuicamp.workers.dev/";
            // Backup Proxies
            const proxies = [
                "https://api.allorigins.win/get?url=",
                "https://corsproxy.io/?",
                "https://cors-anywhere.herokuapp.com/"
            ];

            let data = "";
            let success = false;

            // Try different proxies
            for (let proxy of proxies) {
                try {
                    subStatus.innerText = "Trying proxy: " + new URL(proxy).hostname;
                    const target = proxy.includes('allorigins') ? proxy + encodeURIComponent(m3uUrl) : proxy + m3uUrl;
                    const response = await fetch(target);
                    
                    if (proxy.includes('allorigins')) {
                        const json = await response.json();
                        data = json.contents;
                    } else {
                        data = await response.text();
                    }

                    if (data && data.includes('#EXTM3U')) {
                        success = true;
                        break;
                    }
                } catch (e) {
                    console.log("Proxy failed, trying next...");
                }
            }

            if (!success) {
                status.innerText = "Network Error!";
                subStatus.innerText = "All proxies failed. Please refresh.";
                return;
            }

            const lines = data.split('\n');
            let targetIndex = -1;

            // Search for Star Sports 1 Hindi
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].toLowerCase();
                // Looking for keywords to be sure
                if (line.includes('star') && line.includes('sports') && line.includes('hindi') && line.includes('1')) {
                    targetIndex = i;
                    break;
                }
            }

            if (targetIndex !== -1) {
                let drmKey = "";
                let cookie = "";
                let mpdUrl = "";

                // Extracting data from subsequent lines
                for (let j = 1; j <= 6; j++) {
                    let currentLine = lines[targetIndex + j] ? lines[targetIndex + j].trim() : "";
                    if (!currentLine) continue;

                    if (currentLine.includes('license_key=')) {
                        drmKey = currentLine.split('license_key=')[1].trim();
                    } else if (currentLine.includes('"Cookie":')) {
                        const match = currentLine.match(/"Cookie":"(.*?)"/);
                        if (match) cookie = match[1];
                    } else if (currentLine.startsWith('http')) {
                        mpdUrl = currentLine;
                    }
                }

                if (mpdUrl) {
                    status.innerText = "Link Found!";
                    subStatus.innerText = "Launching NS Player...";
                    
                    const intentUrl = `intent://${mpdUrl.replace(/^https?:\/\//, '')}?|Cookie=${encodeURIComponent(cookie)}&drmScheme=clearkey&drmLicense=${drmKey}#Intent;scheme=https;package=com.genuine.leone;S.title=Star_Sports_1_Auto;end`;
                    
                    window.location.href = intentUrl;
                } else {
                    status.innerText = "Stream link missing in list!";
                }
            } else {
                status.innerText = "Channel not found in playlist!";
                subStatus.innerText = "The source might have removed the channel.";
            }
        }

        window.onload = launchPlayer;
    </script>
</body>
</html>
