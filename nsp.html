<!DOCTYPE html>
<html>
<head>
    <title>Star Sports Auto-Launch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0b0b; color: #00ffcc; font-family: sans-serif; text-align: center; padding-top: 30%; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #00ffcc; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-weight: bold; color: #00ffcc; padding: 0 15px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h3 id="status">Fetching Star Sports From Allrounder Worker...</h3>

    <script>
        async function autoLaunchStarSports() {
            const status = document.getElementById('status');
            // Aapka naya single source jahan se poori M3U list fetch karni hai
            const SOURCE_M3U_URL = "https://websource.sonuujamuicamp.workers.dev/?url=https://premiumplugjiotvplusplaylist.shieb6655.workers.dev/"; 

            try {
                // Bina proxy ke direct fetch
                const response = await fetch(SOURCE_M3U_URL);
                const data = await response.text();
                const lines = data.split('\n');
                
                let targetIndex = -1;

                // 1. Strict Target Loop: Pehle check karenge Star Sports 1 Hindi HD ya Hindi kahan hai
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    
                    // Aapke diye gaye format ke hisaab se strict checking
                    if (line.includes('tvg-id="Star_Sports_1_Hindi"') || line.includes('tvg-name="Star Sports 1 Hindi HD"') || line.endsWith(',Star Sports 1 Hindi HD') || line.endsWith(',Star Sports 1 Hindi')) {
                        targetIndex = i;
                        break; // Milte hi loop ko rok do
                    }
                }

                if (targetIndex !== -1) {
                    let drmKey = "";
                    let cookie = "";
                    let mpdUrl = "";

                    // 2. Data Extraction Loop: Us line ke niche ki 6 lines scan karke sab data nikaalna
                    for (let j = 1; j <= 6; j++) {
                        let currentLine = lines[targetIndex + j] ? lines[targetIndex + j].trim() : "";
                        
                        // License key nikaalna
                        if (currentLine.includes('license_key=')) {
                            drmKey = currentLine.split('license_key=')[1].trim();
                        } 
                        // Cookie nikaalna (Extracting raw string from JSON structure)
                        else if (currentLine.includes('"Cookie":')) {
                            let match = currentLine.match(/"Cookie":"(.*?)"/);
                            if (match) cookie = match[1];
                        } 
                        // MPD Link nikaalna
                        else if (currentLine.startsWith('http') && currentLine.includes('.mpd')) {
                            mpdUrl = currentLine;
                        }
                    }

                    // 3. NS Player Intent Execution
                    if (mpdUrl && drmKey && cookie) {
                        status.innerText = "Channel Found! Launching NS Player...";
                        
                        // DRM and Intent format structure
                        const cleanMpdUrl = mpdUrl.replace(/^https?:\/\//, '');
                        const intentUrl = `intent://${cleanMpdUrl}?|Cookie=${encodeURIComponent(cookie)}&drmScheme=clearkey&drmLicense=${drmKey}#Intent;scheme=https;package=com.genuine.leone;S.title=Star_Sports_1_Hindi_HD;end`;

                        // Direct Launch
                        window.location.href = intentUrl;
                    } else {
                        status.innerText = "Error: Key, Cookie ya MPD parameters missing hain!";
                    }
                } else {
                    status.innerText = "Error: Playlist mein 'Star Sports 1 Hindi' nahi mila!";
                }

            } catch (error) {
                status.innerHTML = "<b>Fetch Error!</b><br>Allrounder worker se data nahi mil raha.";
                console.error(error);
            }
        }

        // Page load hote hi turant trigger karein
        window.onload = autoLaunchStarSports;
    </script>
</body>
</html>
